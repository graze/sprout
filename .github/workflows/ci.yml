name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}${{ matrix.prefer_lowest && ' (lowest)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.2', '7.3', '7.4']
        prefer_lowest: [false, true]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Pin composer platform.php
        run: composer config platform.php "$(php -r 'echo PHP_VERSION;')"

      - name: Allow legacy deps with advisories (PHPUnit 5–7, symfony/process 2–4)
        run: composer config audit.block-insecure false

      - name: Install dependencies
        run: composer update --no-ansi --no-interaction --no-progress --no-scripts --prefer-dist ${{ matrix.prefer_lowest && '--prefer-lowest' || '' }}

      - name: Lint (phpcs)
        run: vendor/bin/phpcs -p --warning-severity=0 src/ tests/

      - name: Test (phpunit)
        run: vendor/bin/phpunit

  lint-md:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        run: make lint-md
